# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────────
# Task 7.1 — CI Workflow
# Triggers: every push to 'develop' branch AND every PR targeting 'main'
# Purpose : Lint all Python files in src/ with flake8
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python 3.11 (matches requirements.txt)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies + flake8
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt flake8

      # 4. Run flake8 linter on src/ directory
      #    --max-line-length=120 gives a little more room than PEP-8's 79
      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 --statistics
