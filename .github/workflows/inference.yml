# .github/workflows/inference.yml
# ─────────────────────────────────────────────────────────────────────────────
# Task 7.2 — Inference Workflow
# Triggers: manually via GitHub UI (workflow_dispatch)
# Purpose : Run inference.py with user-supplied text and the trained HF model
# ─────────────────────────────────────────────────────────────────────────────

name: Inference

on:
  workflow_dispatch:
    inputs:
      input_text:
        description: "Text to classify (e.g. 'This movie was absolutely fantastic!')"
        required: true
        default: "This movie was absolutely fantastic!"
      hf_model:
        description: "Hugging Face model repo (leave blank to use default in inference.py)"
        required: false
        default: ""

jobs:
  infer:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install inference dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run inference
      #    HF_TOKEN loaded from GitHub Secrets (Settings → Secrets → Actions)
      #    INPUT_TEXT comes from the manual trigger form above
      - name: Run inference
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_TEXT: ${{ github.event.inputs.input_text }}
          HF_MODEL: ${{ github.event.inputs.hf_model }}
        run: python src/inference.py
